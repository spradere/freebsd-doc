extends: default
page:
  size: B5
  margin: [20mm, 18mm, 24mm, 24mm] # top, right, bottom, left (inner gutter)
base:
  font-family: Times-Roman
  font-size: 10.5
  line-height-length: 13.5
  line-height: 1.3
heading:
  font-family: Times-Roman
  font-style: bold
  orphan-content-limit: 2
  min-height-after: 18
paragraph:
  margin-bottom: 8
code:
  font-family: Courier
  font-size: 9
literal:
  font-family: Courier
  font-size: 9
  line-height: 1.2
prose:
  text-align: justify
block:
  margin-top: 4
  margin-bottom: 8
  orphans: 3
  widows: 3
example:
  break-inside: avoid
listing:
  break-inside: avoid
  padding: [6, 8, 6, 8]
  border-radius: 2
  border-width: 0.5
  border-color: d0d0d0
