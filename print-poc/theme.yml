extends: default
   
page:
  size: B5
  margin: [20mm, 18mm, 24mm, 28mm] # top, right, bottom, left (inner gutter)
base:
  font-family: Noto Serif
  font-size: 10.5
  line-height-length: 13.5
  line-height: 1.35
heading:
  font-family: Times-Roman
  font-style: bold
  orphan-content-limit: 3
  min-height-after: 24
  margin-top: 14
  margin-bottom: 6 
paragraph:
    text-indent: 1.2em
    margin-bottom: 4
code:
  break-inside: avoid 
  font-family: Noto Serif
  font-size: 9
literal:
  font-family: Noto Serif
  font-size: 9
  line-height: 1.2
prose:
  text-align: left
  orphans: 3
  widows: 3
block:
  margin-top: 4
  margin-bottom: 5
  orphans: 3
  widows: 3
example:
  break-inside: avoid
listing:
  break-inside: avoid
  padding: [6, 8, 6, 8]
  border-radius: 2
  border-width: 0.5
  border-color: d0d0d0
  background-color: f8f8f8
